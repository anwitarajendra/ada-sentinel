<!DOCTYPE html>
<html>
<head>
  <title>Delivery Map</title>
  <meta charset="utf-8" />

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    #map {
      height: 100vh;
      width: 100%;
    }
  </style>
</head>

<body>

<div id="map"></div>

<script>

// 🚚 Driver location
const driverLocation = [12.97, 77.59];

// Create map
var map = L.map('map').setView(driverLocation, 12);

// Add OpenStreetMap tiles
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
}).addTo(map);

// 🚚 Driver marker
L.marker(driverLocation)
  .addTo(map)
  .bindPopup("Driver Location")
  .openPopup();


// 📡 Fetch deliveries
fetch('http://localhost:5000/api/deliveries')
  .then(res => res.json())
  .then(async (response) => {

      const deliveries = Array.isArray(response) ? response : response.data;

      console.log("Deliveries:", deliveries);

      // 📍 Add markers
      deliveries.forEach(delivery => {

          const color = delivery.risk_type === "safe" ? "green" : "red";

          L.circleMarker([delivery.lat, delivery.lng], {
              color: color,
              fillColor: color,
              fillOpacity: 0.8,
              radius: 10,
              weight: 2
          })
          .addTo(map)
          .bindPopup(`
            <b>Delivery ID:</b> ${delivery.id}<br>
            <b>Status:</b> ${delivery.status}<br>
            <b>Risk:</b> ${delivery.risk_type}
          `);
      });

      // 🧠 STEP 1: Sort deliveries (basic optimization)
      deliveries.sort((a, b) => {
          const distA = Math.hypot(a.lat - driverLocation[0], a.lng - driverLocation[1]);
          const distB = Math.hypot(b.lat - driverLocation[0], b.lng - driverLocation[1]);
          return distA - distB;
      });

      // 🛣️ STEP 2: Draw REAL routes using OSRM
      for (let i = 0; i < deliveries.length; i++) {

          const start = i === 0
              ? driverLocation
              : [deliveries[i-1].lat, deliveries[i-1].lng];

          const end = [deliveries[i].lat, deliveries[i].lng];

          const color = deliveries[i].risk_type === "safe" ? "green" : "red";

          await drawRoute(start, end, color);
      }

  })
  .catch(err => {
      console.error("Error fetching deliveries:", err);
  });


// 🚀 FUNCTION: Draw real road route
async function drawRoute(start, end, color) {

    try {
        const url = `https://router.project-osrm.org/route/v1/driving/${start[1]},${start[0]};${end[1]},${end[0]}?overview=full&geometries=geojson`;

        const res = await fetch(url);
        const data = await res.json();

        const route = data.routes[0].geometry;

        L.geoJSON(route, {
            style: {
                color: color,
                weight: 4
            }
        }).addTo(map);

    } catch (err) {
        console.error("Route error:", err);
    }
}

</script>

</body>
</html>
